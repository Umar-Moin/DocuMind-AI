<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DocuMind AI</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f7f8;
  color: #111;
  display: flex;
  justify-content: center;
  padding: 1.5rem 1rem;
}

.container {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

header {
  text-align: center;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 600;
}

header p {
  font-size: 0.8rem;
  color: #6b7280;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 1rem;
}

.card-label {
  font-size: 0.7rem;
  color: #9ca3af;
  margin-bottom: 0.7rem;
  font-weight: 600;
}

.upload-area {
  border: 1.5px dashed #d1d5db;
  border-radius: 10px;
  padding: 1.2rem;
  text-align: center;
  background: #fafafa;
  cursor: pointer;
}

.upload-area:hover {
  border-color: #4f46e5;
}

.upload-area svg {
  width: 28px;
  height: 28px;
  margin-bottom: 0.5rem;
  opacity: 0.5;
}

.upload-area p {
  font-size: 0.85rem;
  color: #6b7280;
}

.upload-area span {
  color: #4f46e5;
  cursor: pointer;
}

.upload-area input { display: none; }

.file-item {
  display: flex;
  justify-content: space-between;
  background: #f3f4f6;
  padding: 0.4rem 0.6rem;
  border-radius: 6px;
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

.file-remove {
  border: none;
  background: none;
  cursor: pointer;
  color: #999;
}

.btn {
  font-size: 0.8rem;
  padding: 0.45rem 0.9rem;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
  background: white;
  cursor: pointer;
}

.btn-primary {
  background: #4f46e5;
  color: white;
  border: none;
}

.process-row {
  display: flex;
  justify-content: space-between;
  margin-top: 0.6rem;
}

.status-pill {
  font-size: 0.7rem;
  padding: 0.25rem 0.6rem;
  border-radius: 999px;
  background: #eee;
}

.status-pill.ready {
  background: #dcfce7;
  color: #15803d;
}

.chat-window {
  min-height: 240px;
  max-height: 320px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.message {
  max-width: 85%;
}

.message.user { align-self: flex-end; }

.bubble {
  padding: 0.6rem 0.9rem;
  border-radius: 10px;
  font-size: 0.85rem;
}

.message.user .bubble {
  background: #4f46e5;
  color: white;
}

.message.assistant .bubble {
  background: #f3f4f6;
}

.input-row {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.7rem;
}

.input-row input {
  flex: 1;
  padding: 0.5rem;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.empty-state {
  text-align: center;
  color: #aaa;
  font-size: 0.8rem;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>DocuMind AI</h1>
  <p>Upload documents and ask questions</p>
</header>

<div class="card">
  <div class="card-label">Documents</div>

  <div class="upload-area" onclick="fileInput.click()">
    <input type="file" id="fileInput" accept=".pdf" multiple />
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 16V8m0 0-3 3m3-3 3 3" stroke-linecap="round"/>
    </svg>
    <p>Drag & drop PDF or <span>browse</span></p>
  </div>

  <div id="fileList"></div>

  <div class="process-row">
    <span class="status-pill" id="statusPill">No docs</span>
    <button class="btn btn-primary" id="processBtn" onclick="processFiles()" disabled>Process</button>
  </div>
</div>

<div class="card">
  <div class="card-label">Chat</div>

  <div class="chat-window" id="chatWindow">
    <div class="empty-state">Upload document to start</div>
  </div>

  <div class="input-row">
    <input id="questionInput" placeholder="Ask a question..." disabled />
    <button class="btn btn-primary" id="sendBtn" onclick="sendQuestion()" disabled>Send</button>
  </div>
</div>

</div>

<script>
const API = "http://localhost:8000";
let files = [];

const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change", () => addFiles([...fileInput.files]));

function addFiles(newFiles){
  newFiles.forEach(f=>{
    if(!files.find(x=>x.name===f.name)) files.push(f);
  });
  renderFiles();
}

function renderFiles(){
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  files.forEach(f=>{
    const div = document.createElement("div");
    div.className="file-item";
    div.innerHTML = `${f.name} <button onclick="removeFile('${f.name}')">x</button>`;
    list.appendChild(div);
  });
  document.getElementById("processBtn").disabled = files.length===0;
}

function removeFile(name){
  files = files.filter(f=>f.name!==name);
  renderFiles();
}

async function processFiles(){
  const form = new FormData();
  files.forEach(f=>form.append("files",f));

  const res = await fetch(API+"/upload",{method:"POST",body:form});
  await res.json();

  document.getElementById("statusPill").textContent="Ready";
  document.getElementById("statusPill").classList.add("ready");
  document.getElementById("questionInput").disabled=false;
  document.getElementById("sendBtn").disabled=false;
}

async function sendQuestion(){
  const input = document.getElementById("questionInput");
  const q = input.value;
  input.value="";

  appendMsg("user",q);

  const res = await fetch(API+"/ask",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({question:q})
  });

  const data = await res.json();
  appendMsg("assistant",data.answer);
}

function appendMsg(role,text){
  const div=document.createElement("div");
  div.className="message "+role;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}
</script>

</body>
</html>
